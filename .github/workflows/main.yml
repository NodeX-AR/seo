# .github/workflows/undetected-search.yml
name: Undetected Chrome Search

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  search:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install undetected-chromedriver selenium
          sudo apt-get update
          sudo apt-get install -y chromium-browser
      
      - name: Run undetected search
        run: |
          python - << 'EOF'
          import undetected_chromedriver as uc
          import random
          import time
          from selenium.webdriver.common.by import By
          from selenium.webdriver.common.keys import Keys
          
          SEARCH_TERM = "eaglercraft server"
          TARGET_URL = "https://z-x.ddns.net/"
          MAX_PAGES = 50
          
          def generate_random_ips(count=50):
              ips = []
              for _ in range(count):
                  ip = f"{random.randint(1,255)}.{random.randint(0,255)}.{random.randint(0,255)}.{random.randint(1,254)}"
                  ips.append(ip)
              return ips
          
          num_devices = random.randint(1, 5)
          all_ips = generate_random_ips(50)
          selected_ips = random.sample(all_ips, num_devices)
          
          print(f"📱 Using {num_devices} device(s)")
          success_count = 0
          
          for i, device_ip in enumerate(selected_ips, 1):
              print(f"\n🖥️  DEVICE {i}/{num_devices} (IP: {device_ip})")
              
              driver = None
              try:
                  options = uc.ChromeOptions()
                  options.add_argument('--headless=new')
                  options.add_argument('--no-sandbox')
                  options.add_argument('--disable-dev-shm-usage')
                  
                  driver = uc.Chrome(options=options)
                  
                  print("  🌐 Searching Google...")
                  driver.get("https://www.google.com")
                  time.sleep(2)
                  
                  search_box = driver.find_element(By.NAME, "q")
                  search_box.send_keys(SEARCH_TERM)
                  search_box.send_keys(Keys.RETURN)
                  time.sleep(3)
                  
                  found = False
                  for page_num in range(1, MAX_PAGES + 1):
                      print(f"  📄 Scanning page {page_num}...")
                      
                      links = driver.find_elements(By.XPATH, "//a[@href]")
                      for link in links:
                          try:
                              url = link.get_attribute("href")
                              if url and TARGET_URL in url:
                                  print(f"  ✅ FOUND on page {page_num}!")
                                  link.click()
                                  time.sleep(2)
                                  found = True
                                  break
                          except:
                              continue
                      
                      if found:
                          break
                      
                      try:
                          next_btn = driver.find_element(By.ID, "pnnext")
                          next_btn.click()
                          time.sleep(3)
                      except:
                          break
                  
                  if found:
                      success_count += 1
                      print(f"  ✅ Device {i} SUCCESS!")
                  else:
                      print(f"  ❌ Device {i} FAILED")
                      
              except Exception as e:
                  print(f"  ❌ Error: {str(e)[:100]}")
              finally:
                  if driver:
                      driver.quit()
              
              if i < num_devices:
                  time.sleep(random.uniform(2, 4))
          
          print(f"\n✅ Success rate: {success_count}/{num_devices}")
          EOF
