# .github/workflows/automated-search.yml
name: Automated Google Search for zx server

on:
  schedule:
    - cron: '0 */3 * * *'
    - cron: '15 */4 * * *'
    - cron: '30 */5 * * *'
    - cron: '45 */6 * * *'
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Number of pages to search'
        required: false
        default: '30'
        type: choice
        options:
          - '20'
          - '30'
          - '40'
          - '50'

jobs:
  search-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps
      
      - name: Create search script with improved pagination
        run: |
          cat > search.py << 'EOF'
          import random
          import time
          import os
          import sys
          from playwright.sync_api import sync_playwright
          
          # Configuration
          SEARCH_TERM = "eaglercraft server"
          TARGET_URL = "https://z-x.ddns.net/"
          MAX_PAGES = random.randint(20, 50)
          
          if os.getenv('MAX_PAGES') and os.getenv('MAX_PAGES') != '0':
              MAX_PAGES = int(os.getenv('MAX_PAGES'))
          
          def generate_random_ips(count=100):
              ips = []
              for _ in range(count):
                  ip = f"{random.randint(1,255)}.{random.randint(0,255)}.{random.randint(0,255)}.{random.randint(1,254)}"
                  ips.append(ip)
              return ips
          
          def random_delay(min_sec=1, max_sec=5):
              delay = random.uniform(min_sec, max_sec)
              print(f"  ⏱️  Delay: {delay:.1f}s")
              time.sleep(delay)
          
          def go_to_next_page(page, current_page):
              """Try multiple methods to go to next page"""
              try:
                  # Method 1: Try the standard next button
                  next_btn = page.query_selector('#pnnext')
                  if next_btn and next_btn.is_visible():
                      next_btn.click()
                      return True
                  
                  # Method 2: Try by aria-label
                  next_btn = page.query_selector('[aria-label="Next"]')
                  if next_btn and next_btn.is_visible():
                      next_btn.click()
                      return True
                  
                  # Method 3: Try by text
                  next_btn = page.query_selector('a:has-text("Next")')
                  if next_btn and next_btn.is_visible():
                      next_btn.click()
                      return True
                  
                  # Method 4: Try by CSS selector for navigation links
                  nav_links = page.query_selector_all('a[aria-label*="Next"], a#pnnext, a[jsname="VjFXif"]')
                  for link in nav_links:
                      if link.is_visible():
                          link.click()
                          return True
                  
                  # Method 5: Use JavaScript to find and click
                  result = page.evaluate('''
                      () => {
                          const nextBtn = document.querySelector('#pnnext, [aria-label="Next"], a:has-text("Next")');
                          if (nextBtn) {
                              nextBtn.click();
                              return true;
                          }
                          return false;
                      }
                  ''')
                  if result:
                      return True
                  
                  print(f"  ⚠️  Could not find next button at page {current_page}")
                  return False
                  
              except Exception as e:
                  print(f"  ⚠️  Error clicking next: {str(e)[:100]}")
                  return False
          
          def search_and_click(page, max_pages):
              try:
                  random_delay(1, 3)
                  
                  # Go to Google with retry
                  for attempt in range(3):
                      try:
                          page.goto("https://www.google.com", wait_until="domcontentloaded", timeout=30000)
                          break
                      except:
                          if attempt == 2:
                              raise
                          random_delay(2, 4)
                  
                  random_delay(2, 4)
                  
                  # Accept cookies
                  try:
                      accept_selectors = [
                          'button:has-text("Accept all")',
                          'button:has-text("I agree")',
                          'button:has-text("Accept")',
                          '[aria-label="Accept all"]'
                      ]
                      for selector in accept_selectors:
                          accept_btn = page.query_selector(selector)
                          if accept_btn and accept_btn.is_visible():
                              accept_btn.click()
                              random_delay(1, 2)
                              break
                  except:
                      pass
                  
                  # Search
                  search_input = page.query_selector('textarea[name="q"], input[name="q"]')
                  if not search_input:
                      search_input = page.query_selector('[aria-label="Search"]')
                  
                  # Clear and type
                  search_input.click()
                  search_input.fill('')
                  for char in SEARCH_TERM:
                      search_input.type(char)
                      time.sleep(random.uniform(0.03, 0.1))
                  
                  random_delay(0.5, 1)
                  search_input.press("Enter")
                  
                  # Wait for results
                  page.wait_for_load_state("networkidle", timeout=30000)
                  random_delay(3, 5)
                  
                  found = False
                  page_num = 1
                  
                  while page_num <= max_pages and not found:
                      print(f"  📄 Scanning page {page_num}/{max_pages}...")
                      
                      # Wait for results to load
                      page.wait_for_timeout(2000)
                      
                      # Get all links
                      links = page.query_selector_all('a[href]')
                      print(f"  🔗 Found {len(links)} links on page {page_num}")
                      
                      for link in links:
                          try:
                              href = link.get_attribute('href')
                              if href and TARGET_URL in href:
                                  print(f"  ✅ FOUND target URL on page {page_num}!")
                                  print(f"  📍 URL: {href}")
                                  
                                  random_delay(1, 2)
                                  link.click()
                                  page.wait_for_load_state("networkidle", timeout=30000)
                                  random_delay(2, 3)
                                  found = True
                                  break
                          except:
                              continue
                      
                      # Go to next page if not found
                      if not found and page_num < max_pages:
                          print(f"  🔄 Attempting to go to page {page_num + 1}...")
                          if go_to_next_page(page, page_num):
                              page.wait_for_load_state("networkidle", timeout=30000)
                              random_delay(3, 5)
                              page_num += 1
                          else:
                              print(f"  ⏹️  Cannot go to next page (stopped at page {page_num})")
                              break
                      else:
                          break
                  
                  if not found:
                      print(f"  ❌ Target URL not found in {page_num} pages")
                  
                  return found, page_num
                  
              except Exception as e:
                  print(f"  ❌ Error: {str(e)[:200]}")
                  return False, 0
          
          def main():
              print("=" * 70)
              print("🤖 AUTO SEARCH - zx server (Improved Pagination)")
              print("=" * 70)
              print(f"🎯 Target: {TARGET_URL}")
              print(f"🔍 Search: {SEARCH_TERM}")
              print(f"📚 Max Pages: {MAX_PAGES}")
              
              # Generate IPs
              all_ips = generate_random_ips(100)
              print(f"\n📡 Generated {len(all_ips)} random IPs")
              
              # Random device count (1-5)
              num_devices = random.randint(1, 5)
              selected_ips = random.sample(all_ips, num_devices)
              print(f"📱 Using {num_devices} device(s)")
              for idx, ip in enumerate(selected_ips, 1):
                  print(f"   Device {idx}: {ip}")
              
              success_count = 0
              
              with sync_playwright() as p:
                  for i, device_ip in enumerate(selected_ips, 1):
                      print(f"\n{'='*70}")
                      print(f"🖥️  DEVICE {i}/{num_devices}")
                      print(f"   Simulated IP: {device_ip}")
                      
                      browser = None
                      try:
                          browser = p.chromium.launch(
                              headless=True,
                              args=[
                                  '--no-sandbox',
                                  '--disable-dev-shm-usage',
                                  '--disable-blink-features=AutomationControlled'
                              ]
                          )
                          
                          # Random viewport
                          width = random.choice([1366, 1920, 1536])
                          height = random.choice([768, 1080, 864])
                          
                          context = browser.new_context(
                              viewport={'width': width, 'height': height},
                              user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36'
                          )
                          page = context.new_page()
                          
                          # Search and click
                          found, pages = search_and_click(page, MAX_PAGES)
                          
                          if found:
                              success_count += 1
                              print(f"  ✅ Device {i} SUCCESS! (found on page {pages})")
                          else:
                              print(f"  ❌ Device {i} FAILED (searched {pages} pages)")
                          
                          # Random delay between devices
                          if i < num_devices:
                              delay = random.uniform(5, 12)
                              print(f"  ⏱️  Waiting {delay:.1f}s before next device...")
                              time.sleep(delay)
                              
                      except Exception as e:
                          print(f"  ❌ Device {i} ERROR: {str(e)[:150]}")
                      finally:
                          if browser:
                              browser.close()
              
              # Print summary
              print("\n" + "=" * 70)
              print("📊 FINAL RESULTS")
              print("=" * 70)
              print(f"✅ Successful devices: {success_count}/{num_devices}")
              print(f"📈 Success rate: {(success_count/num_devices)*100:.1f}%")
              
              if success_count > 0:
                  print("\n🎯 Target URL was found and clicked!")
              else:
                  print("\n⚠️  Target URL was NOT found in search results")
              
              print("\n✨ Search completed!")
              return success_count > 0
          
          if __name__ == "__main__":
              # Random startup delay
              startup_delay = random.uniform(0, 30)
              if startup_delay > 5:
                  print(f"⏰ Random startup delay: {startup_delay:.0f} seconds")
                  time.sleep(startup_delay)
              
              success = main()
              sys.exit(0 if success else 1)
          EOF
          
          echo "✅ Script created"
      
      - name: Run search automation
        env:
          MAX_PAGES: ${{ github.event.inputs.max_pages || '0' }}
        run: |
          python search.py
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: search-results
          path: |
            search.py
          retention-days: 3
