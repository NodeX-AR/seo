# .github/workflows/automated-search.yml
name: Automated Google Search for zx server

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Number of pages to search'
        required: false
        default: '15'
      num_devices:
        description: 'Number of devices (1-5)'
        required: false
        default: 'random'

jobs:
  search-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Chrome and ChromeDriver
        run: |
          # Remove existing Chrome and ChromeDriver
          sudo apt-get remove -y google-chrome-stable chromium-browser chromium-chromedriver
          sudo apt-get autoremove -y
          
          # Install latest Chrome
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          
          # Install ChromeDriver matching Chrome version
          CHROME_VERSION=$(google-chrome --version | awk '{print $3}' | cut -d '.' -f 1-3)
          echo "Chrome version: $CHROME_VERSION"
          
          # Download matching ChromeDriver
          wget -O chromedriver.zip "https://edgedl.me.gvt1.com/edgedl/chrome/chrome-for-testing/${CHROME_VERSION}/linux64/chromedriver-linux64.zip"
          unzip chromedriver.zip
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          
          # Clean up
          rm -rf chromedriver.zip chromedriver-linux64
          
          echo "ChromeDriver installed: $(chromedriver --version)"
      
      - name: Install Python dependencies
        run: |
          pip install selenium webdriver-manager
      
      - name: Create search script
        run: |
          cat > search.py << 'EOF'
          import random
          import time
          import os
          import sys
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.common.keys import Keys
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager
          
          # Configuration
          SEARCH_TERM = "eaglercraft server"
          TARGET_URL = "https://z-x.ddns.net/"
          
          # Get parameters from environment
          MAX_PAGES = int(os.getenv('MAX_PAGES', '15'))
          NUM_DEVICES_INPUT = os.getenv('NUM_DEVICES', 'random')
          
          def generate_random_ips(count=50):
              ips = []
              for _ in range(count):
                  ip = f"{random.randint(1,255)}.{random.randint(0,255)}.{random.randint(0,255)}.{random.randint(1,254)}"
                  ips.append(ip)
              return ips
          
          def get_device_count():
              if NUM_DEVICES_INPUT == 'random':
                  return random.randint(1, 5)
              else:
                  return int(NUM_DEVICES_INPUT)
          
          def create_driver():
              """Create Chrome driver with proper options"""
              options = Options()
              options.add_argument("--headless=new")
              options.add_argument("--no-sandbox")
              options.add_argument("--disable-dev-shm-usage")
              options.add_argument("--disable-gpu")
              options.add_argument("--window-size=1920,1080")
              options.add_argument("--disable-blink-features=AutomationControlled")
              options.add_argument("--user-agent=Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36")
              options.add_experimental_option("excludeSwitches", ["enable-automation"])
              options.add_experimental_option('useAutomationExtension', False)
              
              # Use webdriver-manager to handle driver automatically
              service = Service(ChromeDriverManager().install())
              driver = webdriver.Chrome(service=service, options=options)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")
              return driver
          
          def search_and_click(driver, max_pages):
              try:
                  print("  🌐 Navigating to Google...")
                  driver.get("https://www.google.com")
                  time.sleep(3)
                  
                  print(f"  🔍 Searching for '{SEARCH_TERM}'...")
                  search_box = driver.find_element(By.NAME, "q")
                  search_box.send_keys(SEARCH_TERM)
                  search_box.send_keys(Keys.RETURN)
                  time.sleep(4)
                  
                  found = False
                  page = 1
                  
                  while page <= max_pages and not found:
                      print(f"  📄 Scanning page {page}...")
                      
                      # Wait for results
                      time.sleep(2)
                      
                      # Get all links on page
                      links = driver.find_elements(By.XPATH, "//a[@href]")
                      
                      for link in links:
                          try:
                              url = link.get_attribute("href")
                              if url and TARGET_URL in url:
                                  print(f"  ✅ FOUND target URL on page {page}!")
                                  print(f"  📍 URL: {url}")
                                  
                                  # Scroll to and click
                                  driver.execute_script("arguments[0].scrollIntoView(true);", link)
                                  time.sleep(1)
                                  link.click()
                                  time.sleep(3)
                                  found = True
                                  break
                          except:
                              continue
                      
                      # Go to next page if not found
                      if not found and page < max_pages:
                          try:
                              next_btn = driver.find_element(By.ID, "pnnext")
                              driver.execute_script("arguments[0].scrollIntoView(true);", next_btn)
                              time.sleep(1)
                              next_btn.click()
                              page += 1
                              time.sleep(3)
                          except Exception as e:
                              print(f"  ⏹️  No more pages (stopped at page {page})")
                              break
                      else:
                          break
                  
                  if not found:
                      print(f"  ❌ Target URL not found in {page} pages")
                  
                  return found, page
                  
              except Exception as e:
                  print(f"  ❌ Error: {str(e)[:150]}")
                  return False, 0
          
          def main():
              print("=" * 70)
              print("🤖 AUTO SEARCH - zx server")
              print("=" * 70)
              
              # Generate IPs
              all_ips = generate_random_ips(50)
              print(f"\n📡 Generated {len(all_ips)} random IPs")
              
              # Select devices
              num_devices = get_device_count()
              selected_ips = random.sample(all_ips, num_devices)
              print(f"📱 Using {num_devices} device(s)")
              
              success_count = 0
              results = []
              
              for i, device_ip in enumerate(selected_ips, 1):
                  print(f"\n{'='*70}")
                  print(f"🖥️  DEVICE {i}/{num_devices}")
                  print(f"   Simulated IP: {device_ip}")
                  print(f"   {'='*60}")
                  
                  driver = None
                  try:
                      driver = create_driver()
                      found, pages = search_and_click(driver, MAX_PAGES)
                      
                      if found:
                          success_count += 1
                          print(f"  ✅ Device {i} SUCCESS! (found on page {pages})")
                      else:
                          print(f"  ❌ Device {i} FAILED (searched {pages} pages)")
                      
                      results.append({
                          'device': i,
                          'ip': device_ip,
                          'success': found,
                          'pages_searched': pages
                      })
                      
                      # Random delay between devices
                      if i < num_devices:
                          delay = random.uniform(3, 6)
                          print(f"  ⏱️  Waiting {delay:.1f}s before next device...")
                          time.sleep(delay)
                          
                  except Exception as e:
                      print(f"  ❌ Device {i} ERROR: {str(e)[:100]}")
                      results.append({
                          'device': i,
                          'ip': device_ip,
                          'success': False,
                          'error': str(e)[:100]
                      })
                  finally:
                      if driver:
                          driver.quit()
              
              # Print summary
              print("\n" + "=" * 70)
              print("📊 FINAL RESULTS")
              print("=" * 70)
              for r in results:
                  status = "✅" if r['success'] else "❌"
                  pages = r.get('pages_searched', 'N/A')
                  print(f"  {status} Device {r['device']} ({r['ip']}): {pages} pages")
              
              print(f"\n✅ Successful devices: {success_count}/{num_devices}")
              print(f"📈 Success rate: {(success_count/num_devices)*100:.1f}%")
              
              if success_count > 0:
                  print("\n🎯 Target URL was found and clicked!")
              else:
                  print("\n⚠️  Target URL was NOT found in search results")
              
              print("\n✨ Search completed!")
              return success_count > 0
          
          if __name__ == "__main__":
              success = main()
              sys.exit(0 if success else 1)
          EOF
          
          echo "✅ Script created"
      
      - name: Run search automation
        env:
          MAX_PAGES: ${{ github.event.inputs.max_pages || '15' }}
          NUM_DEVICES: ${{ github.event.inputs.num_devices || 'random' }}
          WDM_LOG_LEVEL: 0  # Reduce webdriver-manager logging
        run: |
          python search.py
      
      - name: Upload results on success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: search-results
          path: |
            search.py
            *.log
          retention-days: 3
      
      - name: Success notification
        if: success()
        run: |
          echo "✅ Workflow completed successfully at $(date)"
          echo "🔍 Search completed for 'zx server'"
